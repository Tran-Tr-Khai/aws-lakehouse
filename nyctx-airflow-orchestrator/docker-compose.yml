x-airflow-common:
  &airflow-common
  build:
    context: ..
    dockerfile: nyctx-airflow-orchestrator/Dockerfile
  image: nyctx-airflow:2.10.5-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Bangkok
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret-key
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_PROFILE: ${AWS_PROFILE:-default}
    NYCTX_S3_BUCKET: ${NYCTX_S3_BUCKET:-nyc-taxi-lakehouse-tntk}
    NYCTX_GLUE_JOB_NAME: ${NYCTX_GLUE_JOB_NAME:-glue-silver-yellow-taxi}
    NYCTX_ATHENA_WORKGROUP: ${NYCTX_ATHENA_WORKGROUP:-wg_nyc_taxi_lakehouse}
    NYCTX_ATHENA_OUTPUT_LOCATION: ${NYCTX_ATHENA_OUTPUT_LOCATION:-s3://nyc-taxi-lakehouse-tntk/athena-results/}
    NYCTX_ATHENA_DATABASE: ${NYCTX_ATHENA_DATABASE:-nyc_taxi_lakehouse}
    NYCTX_ATHENA_SILVER_TABLE: ${NYCTX_ATHENA_SILVER_TABLE:-silver_yellow_taxi}
    NYCTX_DBT_ATHENA_WORKGROUP: ${NYCTX_DBT_ATHENA_WORKGROUP:-wg_nyc_taxi_dbt}
    NYCTX_DBT_ATHENA_OUTPUT_LOCATION: ${NYCTX_DBT_ATHENA_OUTPUT_LOCATION:-s3://nyc-taxi-lakehouse-tntk/athena-results/dbt/}
    NYCTX_DBT_GOLD_S3_BASE: ${NYCTX_DBT_GOLD_S3_BASE:-s3://nyc-taxi-lakehouse-tntk/gold}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ../:/opt/airflow/project
    - ${HOME}/.aws:/home/airflow/.aws:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_FIRSTNAME: Khai
      _AIRFLOW_WWW_USER_LASTNAME: Tran
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    command: version
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres-db-volume:
