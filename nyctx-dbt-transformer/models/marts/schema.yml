version: 2

models:
  - name: mart_daily_trip_revenue
    description: Daily trip and revenue mart for the first Power BI dashboard page. Date attributes live in dim_date.
    columns:
      - name: date_key
        description: Date key in yyyyMMdd format. One row per pickup date.
        tests:
          - not_null
          - unique

      - name: date
        description: Calendar date.
        tests:
          - not_null
          - unique

      - name: total_trips
        description: Total number of valid analytical trips for the date.
        tests:
          - not_null

      - name: total_passengers
        description: Total passengers for the date.
        tests:
          - not_null

      - name: total_revenue
        description: Total trip amount for the date.
        tests:
          - not_null

      - name: total_fare_amount
        description: Total base fare amount for the date.
        tests:
          - not_null

      - name: total_tip_amount
        description: Total tip amount for the date.
        tests:
          - not_null

      - name: total_tolls_amount
        description: Total tolls amount for the date.
        tests:
          - not_null

      - name: total_airport_fee
        description: Total airport fee amount for the date.
        tests:
          - not_null

      - name: total_congestion_surcharge
        description: Total congestion surcharge amount for the date.
        tests:
          - not_null

      - name: avg_total_amount
        description: Average trip total amount for the date.
        tests:
          - not_null

      - name: avg_trip_distance
        description: Average trip distance for the date.
        tests:
          - not_null

      - name: avg_trip_duration_minutes
        description: Average trip duration for the date.
        tests:
          - not_null

      - name: credit_card_trips
        description: Trip count paid by credit card.
        tests:
          - not_null

      - name: cash_trips
        description: Trip count paid by cash.
        tests:
          - not_null

      - name: airport_fee_trips
        description: Trip count with a positive airport fee.
        tests:
          - not_null

      - name: warning_trip_count
        description: Trip count retained for analytics but marked with non-critical warning flags.
        tests:
          - not_null

  - name: mart_hourly_demand
    description: Optional mart built from fact_trip, dim_date, and dim_hour. Disabled by default until the dashboard needs it.
    columns:
      - name: date_key
        description: Date key in yyyyMMdd format.
        tests:
          - not_null

      - name: hour_key
        description: Hour of day from 0 to 23.
        tests:
          - not_null

      - name: total_trips
        description: Total number of valid analytical trips for the date-hour.
        tests:
          - not_null

      - name: total_passengers
        description: Total passengers for the date-hour.
        tests:
          - not_null

      - name: total_amount
        description: Total trip amount for the date-hour.
        tests:
          - not_null

      - name: time_period
        description: Time period bucket for the hour.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['late_night', 'morning', 'midday', 'evening', 'night']
                quote: true

  - name: mart_pickup_zone_performance
    description: Optional mart built from fact_trip and dim_zone. Disabled by default until the dashboard needs it.
    columns:
      - name: pickup_location_id
        description: Pickup taxi zone location identifier.
        tests:
          - not_null
          - unique

      - name: pickup_borough
        description: Pickup borough.
        tests:
          - not_null

      - name: pickup_zone
        description: Pickup taxi zone name.
        tests:
          - not_null

      - name: total_trips
        description: Total number of valid analytical trips from the pickup zone.
        tests:
          - not_null

      - name: total_passengers
        description: Total passengers from the pickup zone.
        tests:
          - not_null

      - name: total_amount
        description: Total trip amount from the pickup zone.
        tests:
          - not_null

  - name: mart_payment_behavior
    description: Optional mart built from fact_trip and dim_payment_type. Disabled by default until the dashboard needs it.
    columns:
      - name: payment_type_id
        description: Payment type identifier.
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
                quote: false

      - name: payment_type_name
        description: Payment type label.
        tests:
          - not_null

      - name: total_trips
        description: Total number of valid analytical trips by payment type.
        tests:
          - not_null

      - name: total_amount
        description: Total trip amount by payment type.
        tests:
          - not_null

      - name: total_fare_amount
        description: Total fare amount by payment type.
        tests:
          - not_null

      - name: total_tip_amount
        description: Total tip amount by payment type.
        tests:
          - not_null
  - name: mart_airport_trip_summary
    description: Optional airport trip summary mart built from fact_trip and dim_zone. Disabled by default until the dashboard needs it.
    columns:
      - name: airport_trip_type
        description: Airport trip category.
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['airport_to_airport', 'airport_pickup', 'airport_dropoff', 'non_airport']
                quote: true

      - name: total_trips
        description: Total number of valid analytical trips by airport category.
        tests:
          - not_null

      - name: total_passengers
        description: Total passengers by airport category.
        tests:
          - not_null

      - name: total_amount
        description: Total trip amount by airport category.
        tests:
          - not_null

      - name: total_airport_fee
        description: Total airport fee by airport category.
        tests:
          - not_null
