selectors:
  - name: dashboard_daily_revenue
    description: Build the Gold objects needed for the first Power BI daily revenue dashboard.
    definition:
      union:
        - method: fqn
          value: dim_date
        - method: fqn
          value: dim_hour
        - method: fqn
          value: dim_payment_type
        - method: fqn
          value: dim_rate_code
        - method: fqn
          value: dim_vendor
        - method: fqn
          value: fact_trip
        - method: fqn
          value: mart_daily_trip_revenue
